name: melora
description: AI-Powered Voice-Controlled Radio Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  just_audio: ^0.9.36
  audio_service: ^0.18.12
  audio_session: ^0.1.13
  http: ^1.1.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  permission_handler: ^11.1.0
  speech_to_text: ^7.0.0
  flutter_tts: ^4.0.2
  webfeed_revised: ^0.7.2
  xml: ^6.5.0
  url_launcher: ^6.3.1
  path_provider: ^2.1.2
  record: ^6.2.0
  file_picker: ^8.1.2
  web: ^1.1.0
  flutter_local_notifications: ^17.2.4
  audioplayers: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
    - assets/indian_songs.json
